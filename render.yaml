databases:
  - name: talentlink_db
    databaseName: talentlink
    user: talentlink_user
    plan: free

services:
  - type: web
    name: talentlink-web
    env: python
    plan: free
    rootDir: .
    buildCommand: bash build.sh
    startCommand: gunicorn backend.wsgi:application --chdir backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: talentlink_db
          property: connectionString
