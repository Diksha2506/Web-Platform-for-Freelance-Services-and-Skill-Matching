databases:
  - name: talentlink_db
    databaseName: talentlink_db
    user: talentlink_admin
    plan: free

services:
  - type: web
    name: talentlink-web
    env: python
    plan: free
    rootDir: .
    buildCommand: bash build.sh
    startCommand: python backend/manage.py migrate && gunicorn backend.wsgi:application --chdir backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: NODE_VERSION
        value: 18.17.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://talentlink-web.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://talentlink-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: talentlink_db
          property: connectionString
