<!DOCTYPE html>

<body>

    <div class="container">

                <!-- Sidebar -->

            <div class="user-info">

                    <span class="label">Logged in as</span>
                    <h3>diksha.rade24</h3>
                    <span class="role">Client</span>
                </div>
            </div>

            <nav>
                <ul>
                    <li class=""><button onclick="navigate('dashboard.html')"><i class="fas fa-chart-line"></i> Dashboard</button></li>
                    <li class=""><button onclick="navigate('job_listing.html')"><i class="fas fa-briefcase"></i> Job Listings</button></li>

                </ul>
            </nav>

            <div class="bottom-links">

            </div>
        </aside>

        <main class="main">

            <div class="topbar">
                <div>
                    <h1>My Projects</h1>
                    <p>Manage and track all your posted projects</p>
                </div>

                <button class="primary-btn" onclick="navigate('create_project.html')">

            <!-- Projects List -->
            <div id="projectList" class="projects-list">

                <p>Loading projects...</p>
