<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkillSync - Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>

<div class="container">

            <!-- Sidebar -->
        <aside class="sidebar">
            <h2 class="logo">⚡ SkillBridge</h2>

            <div class="user-info">
                <div class="user-avatar">DR</div>
                <div class="user-details">
                    <span class="label">Logged in as</span>
                    <h3>diksha.rade24</h3>
                    <span class="role">Client</span>
                </div>
            </div>

            <nav>
                <ul>
                    <li class=""><button onclick="navigate('dashboard.html')"><i class="fas fa-chart-line"></i> Dashboard</button></li>
                    <li class=""><button onclick="navigate('job_listing.html')"><i class="fas fa-briefcase"></i> Job Listings</button></li>
                    <li class=""><button onclick="navigate('messages.html')"><i class="fas fa-comment-dots"></i> Messages</button></li>
                    <li class=""><button onclick="navigate('payments.html')"><i class="fas fa-wallet"></i> Payments</button></li>
                    <li class=""><button onclick="navigate('projects.html')"><i class="fas fa-user"></i> Projects</button></li>
                    <li class=""><button onclick="navigate('profile.html')"><i class="fas fa-user"></i> Profile</button></li>
                </ul>
            </nav>

            <div class="bottom-links">
                <button class="active" onclick="navigate('settings.html')"><i class="fas fa-gear"></i> Settings</button>
                <button class="" onclick="navigate('help_Center.html')"><i class="fas fa-circle-question"></i> Help & Support</button>
            </div>
        </aside>

    <!-- Main -->
    <main class="main">

        <div class="topbar">
            <div>
                <h1>Settings</h1>
                <p>Manage your account preferences</p>
            </div>
        </div>

        <!-- Account Settings -->
        <div class="settings-card">
            <h3>Account Settings</h3>

            <label>Email</label>
            <input type="email" value="diksha.rade24@vit.edu">

            <label>Username</label>
            <input type="text" value="diksha.rade24">

            <button class="primary-btn" onclick="navigate()">
                Update Account
            </button>
        </div>

        <!-- Password Change -->
        <div class="settings-card">
            <h3>Change Password</h3>

            <label>Current Password</label>
            <input type="password">

            <label>New Password</label>
            <input type="password">

            <label>Confirm New Password</label>
            <input type="password">

            <button class="primary-btn" onclick="navigate()">
                Update Password
            </button>
        </div>

        <!-- Notifications -->
        <div class="settings-card">
            <h3>Notifications</h3>

            <div class="toggle-row">
                <span>Email Notifications</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="toggle-row">
                <span>Push Notifications</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="toggle-row">
                <span>Marketing Emails</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- Danger Zone -->
        <div class="danger-zone">
            <h3>Danger Zone</h3>
            <p>Once you delete your account, there is no going back.</p>
            <button class="delete-btn" onclick="navigate()">
                Delete Account
            </button>
        </div>

    </main>

</div>

</body>
</html>
