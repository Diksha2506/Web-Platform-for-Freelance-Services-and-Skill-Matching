<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkillBridge - Post New Job</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>

<div class="container">

            <!-- Sidebar -->
        <aside class="sidebar">
            <h2 class="logo">⚡ SkillBridge</h2>

            <div class="user-info">
                <div class="user-avatar">DR</div>
                <div class="user-details">
                    <span class="label">Logged in as</span>
                    <h3>diksha.rade24</h3>
                    <span class="role">Client</span>
                </div>
            </div>

            <nav>
                <ul>
                    <li class=""><button onclick="navigate('dashboard.html')"><i class="fas fa-chart-line"></i> Dashboard</button></li>
                    <li class="active"><button onclick="navigate('job_listing.html')"><i class="fas fa-briefcase"></i> Job Listings</button></li>
                    <li class=""><button onclick="navigate('messages.html')"><i class="fas fa-comment-dots"></i> Messages</button></li>
                    <li class=""><button onclick="navigate('payments.html')"><i class="fas fa-wallet"></i> Payments</button></li>
                    <li class=""><button onclick="navigate('projects.html')"><i class="fas fa-user"></i> Projects</button></li>
                    <li class=""><button onclick="navigate('profile.html')"><i class="fas fa-user"></i> Profile</button></li>
                </ul>
            </nav>

            <div class="bottom-links">
                <button class="" onclick="navigate('settings.html')"><i class="fas fa-gear"></i> Settings</button>
                <button class="" onclick="navigate('help_Center.html')"><i class="fas fa-circle-question"></i> Help & Support</button>
            </div>
        </aside>

    <!-- Main -->
    <main class="main">

        <div class="topbar">
            <div>
                <h1>Post New Job</h1>
                <p>Create a new project and hire top talent</p>
            </div>
        </div>

        <div class="job-form-card">

            <form id="jobForm">

    <!-- Job Title -->
    <label>Job Title *</label>
    <input type="text" id="title" name="title" placeholder="e.g. Full Stack Web Developer" required>

    <!-- Category -->
    <label>Category *</label>
    <select id="category" name="category" required>
        <option value="">Select a category</option>
        <option value="web_development">Web Development</option>
        <option value="mobile_development">Mobile Development</option>
        <option value="design">Design & Creative</option>
        <option value="writing">Writing & Content</option>
        <option value="marketing">Marketing & Sales</option>
        <option value="data_science">Data Science & Analytics</option>
        <option value="devops">DevOps & Cloud</option>
        <option value="other">Other</option>
    </select>

    <!-- Job Type -->
    <label>Job Type *</label>
    <select id="job_type" name="job_type" required>
        <option value="freelance">Freelance</option>
        <option value="contract">Contract</option>
        <option value="part_time">Part Time</option>
        <option value="full_time">Full Time</option>
    </select>

    <!-- Experience Level -->
    <label>Experience Level *</label>
    <select id="experience_level" name="experience_level" required>
        <option value="entry">Entry Level</option>
        <option value="intermediate">Intermediate</option>
        <option value="expert">Expert</option>
    </select>

    <!-- Project Duration -->
    <label>Project Duration *</label>
    <select id="project_duration" name="project_duration" required>
        <option value="less_than_1_month">Less than 1 month</option>
        <option value="1_3_months">1-3 months</option>
        <option value="3_6_months">3-6 months</option>
        <option value="more_than_6_months">More than 6 months</option>
    </select>

    <!-- Budget -->
    <label>Budget Amount ($) *</label>
    <input type="number" id="budget" name="budget" placeholder="Enter amount" min="0" step="0.01" required>

    <!-- Description -->
    <label>Job Description *</label>
    <textarea id="description" name="description" rows="6" placeholder="Describe the project in detail, including objectives, deliverables, and any specific requirements..." required></textarea>

    <!-- Skills Required -->
    <label>Skills Required *</label>
    <input type="text" id="skills_required" name="skills_required" placeholder="e.g. React, Node.js, MongoDB (comma-separated)" required>

    <!-- Location -->
    <label>Location</label>
    <input type="text" id="location" name="location" placeholder="e.g. New York, USA or leave blank for remote">

    <!-- Remote Work -->
    <div style="display: flex; align-items: center; gap: 10px; margin: 15px 0;">
        <input type="checkbox" id="remote_allowed" name="remote_allowed" checked style="width: auto;">
        <label for="remote_allowed" style="margin: 0;">Remote work allowed</label>
    </div>

    <!-- Deadline -->
    <label>Application Deadline</label>
    <input type="date" id="deadline" name="deadline">

    <!-- Buttons -->
    <div class="form-actions">
        <button type="button" class="secondary-btn" onclick="navigate('job_listing.html')">
            Cancel
        </button>

        <button type="submit" class="primary-btn">
            <i class="fas fa-paper-plane"></i> Post Job
        </button>
    </div>

</form>


        </div>

    </main>

</div>

</body>
</html>
